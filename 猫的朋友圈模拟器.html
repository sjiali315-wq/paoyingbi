<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐱 圆的朋友圈</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; }
.header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .refresh-btn { background: none; border: none; font-size: 14px; color: #576b95; cursor: pointer; padding: 6px 12px; border-radius: 4px; }
.header .refresh-btn:hover { background: #f0f0f0; }
#new-post-toast { position: fixed; top: 56px; left: 50%; transform: translateX(-50%); z-index: 99; background: rgba(0,0,0,0.75); color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
#new-post-toast.show { opacity: 1; }
.container { max-width: 500px; margin: 0 auto; padding: 60px 0 60px; }
.feed-item { background: #fff; margin-bottom: 10px; padding: 16px; animation: fadeInUp 0.4s ease; border-bottom: 1px solid #e0e0e0; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes heartFloat { 0% { opacity: 1; transform: scale(1) translateY(0); } 100% { opacity: 0; transform: scale(1.5) translateY(-60px); } }
.feed-header { display: flex; align-items: flex-start; margin-bottom: 10px; }
.avatar { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid #e0e0e0; transition: all 0.5s; }
.avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.avatar.golden { border-color: #ffd700; box-shadow: 0 0 12px rgba(255,215,0,0.6); }
.feed-meta { margin-left: 12px; flex: 1; }
.feed-username { font-size: 15px; font-weight: 500; color: #576b95; }
.feed-time { font-size: 12px; color: #999; margin-top: 2px; }
.feed-content { font-size: 15px; line-height: 1.6; margin-bottom: 8px; word-break: break-word; }
.feed-actions { display: flex; gap: 24px; padding-top: 8px; border-top: 1px solid #eee; }
.action-btn { display: flex; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; font-size: 14px; color: #666; padding: 4px 0; }
.action-btn:hover { color: #333; }
.action-btn.liked { color: #e74c3c; }
.action-btn.liked .heart-icon { color: #e74c3c; }
.heart-anim { position: fixed; pointer-events: none; font-size: 22px; z-index: 200; animation: heartFloat 0.8s ease forwards; }
.cat-reply { font-size: 13px; color: #999; margin-top: 4px; padding: 4px 8px; background: #f8f8f8; border-radius: 4px; display: inline-block; }
.comments { margin-top: 8px; padding-top: 6px; border-top: 1px solid #eee; }
.comment-item { font-size: 13px; margin-bottom: 4px; line-height: 1.5; }
.comment-user { color: #576b95; font-weight: 500; }
.comment-cat-reply { color: #999; margin-left: 16px; font-size: 12px; }
.comment-input-wrap { display: flex; gap: 8px; margin-top: 6px; }
.comment-input-wrap input { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 6px 10px; font-size: 13px; outline: none; }
.comment-input-wrap input:focus { border-color: #576b95; }
.comment-input-wrap button { background: #576b95; color: #fff; border: none; border-radius: 4px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
.comment-input-wrap button:hover { background: #465a7a; }
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 300; display: none; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; padding: 24px; width: 320px; max-width: 90%; }
.modal h3 { font-size: 16px; margin-bottom: 12px; text-align: center; }
.modal p { font-size: 14px; text-align: center; color: #666; margin-bottom: 16px; }
.modal .btn-ok { display: block; width: 100%; padding: 10px; background: #576b95; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: #fff; border-top: 1px solid #e0e0e0; padding: 12px 16px; text-align: center; font-size: 13px; color: #999; cursor: pointer; }
.bottom-bar:hover { color: #576b95; }
.global-tip { text-align: center; padding: 20px 16px; font-size: 14px; color: #e74c3c; background: #fff; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>🐱 圆的朋友圈</h1>
  <button class="refresh-btn" onclick="manualRefresh()">🔄 刷新</button>
</div>

<div id="new-post-toast">🐱 猫发布了新动态...</div>
<div class="container" id="feed-container"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">🎉</h3>
    <p id="modal-text"></p>
    <button class="btn-ok" onclick="closeModal()">知道了</button>
  </div>
</div>

<div class="bottom-bar" onclick="manualRefresh()">🐱 猫正在思考下一条朋友圈...</div>

const catName = "圆宝0407";
let items = [];
let totalPosts = 0;
let globalLikeCount = 0;

function randomItem() {
  return contentPool[Math.floor(Math.random() * contentPool.length)];
}

function randomTime() {
  const mins = Math.floor(Math.random() * 240) + 1;
  if (mins < 60) return mins + "分钟前";
  return Math.floor(mins / 60) + "小时前";
}

function createFeedItem(text) {
  return {
    id: Date.now() + Math.random(),
    text: text,
    time: randomTime(),
    liked: false,
    likes: 0,
    comments: [],
    showComment: false,
    likeCount: 0
  };
}

function render() {
  const container = document.getElementById('feed-container');
  container.innerHTML = '';
  if (totalPosts >= 30) {
    const tip = document.createElement('div');
    tip.className = 'global-tip';
    tip.textContent = '🐱 猫的朋友圈已满。猫需要休息了。请刷新页面。';
    container.appendChild(tip);
  }
  items.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'feed-item';
    let commentsHtml = '';
    const visibleComments = item.comments.slice(-3);
    visibleComments.forEach(c => {
      commentsHtml += '<div class="comment-item"><span class="comment-user">' + c.user + '：</span>' + c.text +
        (c.reply ? '<div class="comment-cat-reply">🐱 ' + c.reply + '</div>' : '') + '</div>';
    });
    let likeClass = item.liked ? ' liked' : '';
    let avatarClass = '';
    if (globalLikeCount >= 50) {
      avatarClass = ' golden';
    }
    div.innerHTML =
      '<div class="feed-header">' +
        '<div class="avatar' + avatarClass + '">' +
          '<img src="' + avatarDataUrl + '" alt="avatar">' +
        '</div>' +
        '<div class="feed-meta">' +
          '<div class="feed-username">' + catName + '</div>' +
          '<div class="feed-time">' + item.time + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="feed-content">' + item.text + '</div>' +
      '<div class="feed-actions">' +
        '<button class="action-btn' + likeClass + '" onclick="toggleLike(' + item.id + ')" id="like-btn-' + item.id + '">' +
          '<span class="heart-icon" id="heart-icon-' + item.id + '">❤️</span> ' +
          '<span id="like-count-' + item.id + '">' + item.likes + '</span>' +
        '</button>' +
        '<button class="action-btn" onclick="toggleComment(' + item.id + ')">' +
          '💬 <span id="comment-count-' + item.id + '">' + item.comments.length + '</span>' +
        '</button>' +
      '</div>' +
      '<div class="comments" id="comments-' + item.id + '">' +
        commentsHtml +
        '<div class="comment-input-wrap" id="comment-input-' + item.id + '"' + (item.showComment ? '' : ' style="display:none"') + '>' +
          '<input type="text" id="comment-text-' + item.id + '" placeholder="说点什么..." onkeydown="if(event.key===\\'Enter\\') submitComment(' + item.id + ')">' +
          '<button onclick="submitComment(' + item.id + ')">发送</button>' +
        '</div>' +
      '</div>';
    container.appendChild(div);
  });
}

function toggleLike(id) {
  const item = items.find(i => i.id === id);
  if (!item || item.liked) return;
  item.liked = true;
  item.likes++;
  globalLikeCount++;
  item.likeCount++;

  if (btn) {
    const rect = btn.getBoundingClientRect();
    const heart = document.createElement('div');
    heart.className = 'heart-anim';
    heart.textContent = '❤️';
    heart.style.left = (rect.left + rect.width / 2 - 11) + 'px';
    heart.style.top = rect.top + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 800);
  }
  let msg;
  if (globalLikeCount === 10) {
    msg = "你已经通过了猫的基本测试。";
    showModal("🎖️ 忠实人类认证", "你已经被猫标记为"忠实人类"。🎖️");
  } else if (globalLikeCount === 50) {
    msg = "你已经超越了99%的人类。";
    showModal("🏆 至尊猫奴", "你已经超越了99%的人类。");
  } else {
    if (item.likeCount % 5 === 0) {
      msg = "第 " + item.likeCount + " 个赞。人类，你在收集猫的认可吗？";
    } else {
      msg = thanksMsgs[Math.floor(Math.random() * thanksMsgs.length)];
    }
  }
  const commentsDiv = document.getElementById('comments-' + id);
  const replyDiv = document.createElement('div');
  replyDiv.className = 'cat-reply';
  replyDiv.textContent = '🐱 ' + msg;
  if (commentsDiv && commentsDiv.firstChild) {
    commentsDiv.insertBefore(replyDiv, commentsDiv.firstChild);
  }
  setTimeout(() => replyDiv.remove(), 4000);
  // Update counts
  document.getElementById('like-count-' + id).textContent = item.likes;
  document.getElementById('like-btn-' + id).classList.add('liked');
}

function toggleComment(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.showComment = !item.showComment;
  const wrap = document.getElementById('comment-input-' + id);
  if (wrap) {
    wrap.style.display = item.showComment ? 'flex' : 'none';
    if (item.showComment) {
      document.getElementById('comment-text-' + id).focus();
    }
  }
}

function submitComment(id) {
  const input = document.getElementById('comment-text-' + id);
  if (!input || !input.value.trim()) return;
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.comments.push({
    user: "用户",
    text: input.value.trim(),
    reply: catReplies[Math.floor(Math.random() * catReplies.length)]
  });
  input.value = '';
  item.showComment = false;
  render();
}

function showModal(title, text) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

function addNewPost(scrollToTop) {
  if (totalPosts >= 30) {
    showModal("🐱 休息中", "猫的朋友圈已满。猫需要休息了。请刷新页面。");
    return;
  }
  totalPosts++;
  items.unshift(createFeedItem(randomItem()));
  render();
  if (scrollToTop !== false) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function manualRefresh() {
  addNewPost(true);
}

function init() {
  for (let i = 0; i < 2; i++) {
    if (totalPosts >= 30) break;
    totalPosts++;
    items.push(createFeedItem(randomItem()));
  }
  render();
  function scheduleNext() {
    const delay = Math.floor(Math.random() * 4000) + 8000;
    setTimeout(() => {
      if (totalPosts >= 30) return;
      const toast = document.getElementById('new-post-toast');
      toast.classList.add('show');
      addNewPost(true);
      setTimeout(() => toast.classList.remove('show'), 2000);
      scheduleNext();
    }, delay);
  }
  scheduleNext();
}

window.onload = init;
</script>
</body>
</html>
